<svg xmlns="http://www.w3.org/2000/svg" viewBox="245 10 256 256">
<defs>
    <!-- Background Gradient (Matches App Dark Theme: input -> card -> bg) -->

  <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#FFF59D" />
  <stop offset="100%" stop-color="#FFCC80" />
</linearGradient>

    <!-- Main Scale Accent (Based on App's #34c759 accent preset) -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8FE8A8" />
      <stop offset="25%" stop-color="#5CD67E" />
      <stop offset="50%" stop-color="#34C759" />
      <stop offset="75%" stop-color="#248A3D" />
      <stop offset="100%" stop-color="#1A612B" />
    </linearGradient>

    <!-- Secondary Depth for Pillar/Pointer (Using App Border/Muted Colors) -->
    <linearGradient id="darkGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#262629" />
      <stop offset="35%" stop-color="#3A3A3C" />
      <stop offset="50%" stop-color="#66666E" />
      <stop offset="65%" stop-color="#3A3A3C" />
      <stop offset="100%" stop-color="#262629" />
    </linearGradient>
    
    <!-- Drop Shadow for 3D App Icon effect -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>
  <!-- App Icon Background -->
  <rect width="512" height="512" rx="0" fill="url(#bgGradient)" />

  <!-- Entire Scale Group with Shadow -->
  <g filter="url(#dropShadow)">

    <rect x="156" y="420" width="200" height="16" rx="8" fill="url(#goldGradient)" />
    <rect x="186" y="400" width="140" height="20" rx="8" fill="url(#goldGradient)" />
    <rect x="216" y="380" width="80" height="20" rx="6" fill="url(#goldGradient)" />
    
    <!-- Central Vertical Pillar -->
    <rect x="244" y="140" width="24" height="240" rx="2" fill="url(#darkGold)" />

    <!-- TOP BALANCE BEAM -->
    <!-- Main Beam (Rotated -30 deg, Left side dips down) -->
    <rect x="96" y="128" width="320" height="12" rx="6" fill="url(#goldGradient)" transform="rotate(-30, 256, 134)"/>

    <!-- Pointer / Needle pointing up -->
  
    <path d="M 256 90 L 266 126 L 246 126 Z" fill="url(#darkGold)" transform="rotate(-30, 256, 134)"/>
    
    <!-- Center Pivot Background / Bolt -->
    <circle cx="256" cy="134" r="14" fill="url(#goldGradient)" />
    <circle cx="256" cy="134" r="6" fill="#1A1A2E" />

    <!-- 
      COUNTER-CLOCKWISE (-30 DEG):
      Pivot Point: (256, 134)
      Delta X = 118px, Delta Y = 68px
      
      LEFT ASSEMBLY (Swings DOWN):  X = 256 - 118 = 138 | Y = 134 + 68 = 202
      RIGHT ASSEMBLY (Swings UP):   X = 256 + 118 = 374 | Y = 134 - 68 = 66
    -->
    
    <!-- LEFT PAN ASSEMBLY (Dropped) -->
    <!-- Left Hook -->
    <circle cx="138" cy="217" r="6" fill="none" stroke="url(#goldGradient)" stroke-width="4" />
    <!-- Left Strings (Hanging from 138, 208) -->
    <line x1="138" y1="223" x2="88" y2="338" stroke="url(#goldGradient)" stroke-width="3" stroke-linecap="round" />
    <line x1="138" y1="223" x2="188" y2="338" stroke="url(#goldGradient)" stroke-width="3" stroke-linecap="round" />
    <!-- Left Pan -->
    <path d="M 68 338 C 68 378, 208 378, 208 338 Z" fill="url(#goldGradient)" />

    <!-- RIGHT PAN ASSEMBLY (Elevated) -->
    <!-- Right Hook -->
    <circle cx="374" cy="81" r="16" fill="none" stroke="url(#goldGradient)" stroke-width="10" />
    <!-- Right Strings (Hanging from 374, 72) -->
    <line x1="374" y1="94" x2="324" y2="202" stroke="url(#goldGradient)" stroke-width="20" stroke-linecap="round" />
    <line x1="374" y1="94" x2="424" y2="202" stroke="url(#goldGradient)" stroke-width="20" stroke-linecap="round" />
    <!-- Right Pan -->
    <path d="M 304 202 C 304 282, 444 282, 444 202 Z" fill="url(#goldGradient)" />
    
  </g>
</svg>
